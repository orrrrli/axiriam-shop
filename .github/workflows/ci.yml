name: CI
on:
  pull_request:
  push:

jobs:
  ci:
    name: Build & Tests
    runs-on: ubuntu-latest
    environment: Dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ vars.DATABASE_URL }}
          STRIPE_SECRET_KEY: "sk_test_placeholder"
